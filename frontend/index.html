<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceManage — IBS Умный офис</title>
    <link rel="stylesheet" href="css/greeting.css">
</head>
<body>

<div class="brand-container">
    <img class="brand-logo" src="images/ibs-logo.png" alt="IBS Logo">
    <h1 class="brand-title">SpaceManage</h1>
    <p class="brand-subtitle">IBS <span>·</span> Умный офис</p>
</div>

<button class="open-btn" id="openModalBtn">Войти в систему</button>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <span class="close-btn" id="closeModalBtn">&times;</span>
        <h2>Авторизация</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Логин:</label>
                <input type="text" id="username" required placeholder="Введите логин">
            </div>
            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" required placeholder="Введите пароль">
            </div>
            <div class="form-group">
                <label for="role">Роль в системе:</label>
                <select id="role" required>
                    <option value="" disabled selected>Выберите роль</option>
                    <option value="admin">Администратор</option>
                    <option value="employee">Сотрудник</option>
                </select>
            </div>
            <button type="submit" class="submit-btn">Подтвердить</button>
            <div id="loginError" class="error-msg"></div>
        </form>
    </div>
</div>

<script src="js/greeting.js"></script>
</body>
</html>
