<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceManage — IBS Умный офис</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <div class="brand-container">
        <img class="brand-logo" src="assets/ibs-logo.png" alt="IBS Logo">
        <h1 class="brand-title">SpaceManage</h1>
        <p class="brand-subtitle">IBS <span>·</span> Умный офис</p>
    </div>

    <button class="open-btn" id="openModalBtn">Войти в систему</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-btn" id="closeModalBtn">&times;</span>
            <h2>Авторизация</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Логин:</label>
                    <input type="text" id="username" required placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="submit-btn">Подтвердить</button>
                <div id="loginError" class="error-msg"></div>
            </form>
        </div>
    </div>

<script src="js/index.js"></script>
</body>
</html>
